  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      var fallback = document.getElementById('error-fallback');
      var msg = document.getElementById('error-message');
      var stack = document.getElementById('error-stack');
      if (fallback && msg) {
        fallback.style.display = 'block';
        msg.textContent = message + ' (Line ' + lineno + ', Col ' + colno + ')';
        if (error && error.stack) {
          stack.textContent = error.stack;
        }
      }
      return false;
    };
  </script>

          setWebcamActive(true);
          addChatMessage("ai", "Webcam connected successfully! Frame your face in the mirrored viewfinder, then capture.");

          addChatMessage("ai", "No camera detected or access was denied. Running in simulator mode with target profiles.");

      const speakText = (text) => {
        if (!voiceOn) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        // Try to find a premium English voice
        const voices = window.speechSynthesis.getVoices();
        const premiumVoice = voices.find(v => v.lang.includes("en") && v.name.toLowerCase().includes("google") || v.name.toLowerCase().includes("natural"));
        if (premiumVoice) {
          utterance.voice = premiumVoice;
        }
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
      };

      // Trigger bot speech whenever AI sends a message
      useEffect(() => {

        setScanning(true);
        
        setTimeout(() => {
          try {

            let faceShape = ["Oval", "Square", "Round", "Heart"][Math.floor(Math.random() * 4)];

              skinTone = matchedPreset.skinTone;
              toneHex = matchedPreset.toneHex;
              bodyStructure = "Athletic/Mesomorph";
            } else if (imgElement && imgElement.naturalWidth > 0) {
              // Draw image on canvas to extract skin tone pixel color safely
              const canvas = document.createElement("canvas");
              const ctx = canvas.getContext("2d");
              canvas.width = 150; // Keep canvas small for fast sampling
              canvas.height = 150;
              
              ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
              
              // Sample center point where face is most likely to be
              const sampleX = Math.floor(canvas.width * 0.5);
              const sampleY = Math.floor(canvas.height * 0.45);
              const pixel = ctx.getImageData(sampleX, sampleY, 1, 1).data;
              
              const r = pixel[0];
              const g = pixel[1];
              const b = pixel[2];
              
              // Convert to hex
              const rgbToHex = (r, g, b) => "#" + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? "0" + hex : hex;
              }).join("");
              
              toneHex = rgbToHex(r, g, b);
              
              // Determine skin tone classification
              const brightness = (r * 299 + g * 587 + b * 114) / 1000;
              if (brightness > 210) skinTone = "Porcelain/Fair";
              else if (brightness > 180) skinTone = "Warm Ivory";
              else if (brightness > 140) skinTone = "Warm Honey";
              else if (brightness > 100) skinTone = "Olive/Tan";
              else if (brightness > 60) skinTone = "Rich Bronze";
              else skinTone = "Deep Espresso";
            }
            
            // Set dynamic analysis results

              skinTone,
              hairStyle: stylePref === "male" ? "Textured Quiff" : "Long Elegant Waves",

              fashionStyle,

              palette: [toneHex, "#D4AF37", "#0B0B0D"]
            }));

            setTryOnConfig(prev => ({
              ...prev,
              modelId: matchedPreset ? matchedPreset.id : "custom_upload"
            }));
            
            addChatMessage("ai", `AI Image Scan Complete. I have computed your parameters: Face Shape is ${results.faceShape}, Skin Tone is ${results.skinTone} (True Sample: ${toneHex}), and Body Structure is ${results.bodyStructure}. I have updated your style score to 91 and customized your outfit catalog.`);

                  <div className="flex justify-start pt-2">
                    <div className="bg-stone-900/40 border border-white/5 rounded-full px-3 py-1 flex items-center gap-2">
                      <span className="text-[8px] text-gold uppercase tracking-widest font-mono">Synthesizing:</span>
                      <div className="voice-wave-container">
                        <div className="voice-wave-bar" />
                        <div className="voice-wave-bar" />
                        <div className="voice-wave-bar" />
                        <div className="voice-wave-bar" />
                        <div className="voice-wave-bar" />
                        <div className="voice-wave-bar" />
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* Chat Input */}
              <form 
                onSubmit={(e) => {
                  e.preventDefault();
                  const inp = e.target.elements.chatInput;
                  handleChatSubmit(inp.value);
                  inp.value = "";
                }}
                className="bg-coal p-3 border-t border-white/10 flex gap-2"
              >
                <input 
                  name="chatInput"
                  required
                  placeholder="Ask Aria: 'formal', 'casual', 'trends'..."
                  className="flex-grow bg-stone-900 border border-white/5 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-gold/40"
                />
                <button type="submit" className="btn-gold p-2 rounded-lg text-black">
                  <Icon name="send" className="w-3.5 h-3.5" />
                </button>
              </form>

            </div>
          )}

          {/* FOOTER */}
          <footer className="bg-obsidian border-t border-white/5 py-10 mt-16 text-center text-xs text-stone-500">
            <div className="max-w-7xl mx-auto px-6">
              <span className="font-editorial text-lg tracking-widest text-gold mb-2 block">STYLEAI ATELIER</span>
              <p className="max-w-md mx-auto text-[10px] leading-relaxed mb-6">Inspired by Milanese tailoring and cutting-edge deep learning. StyleAI provides customized digital wardrobing matching true physical skin palettes.</p>
              <div className="flex justify-center gap-6 text-[10px] uppercase tracking-widest text-stone-400 mb-6">
                <span>Milano</span>
                <span>•</span>
                <span>Paris</span>
                <span>•</span>
                <span>Tokyo</span>
                <span>•</span>
                <span>New York</span>
              </div>
              <p className="text-[9px] text-stone-600">© 2026 StyleAI Atelier Corp. All rights reserved. Powered by Generative Deep Learning.</p>
            </div>
          </footer>

        </div>
      );
    }

    // Mount to root DOM node
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
